# darknessRender configuration
# Copy this file to  in your working directory.
# CLI flags override any values set here.

graphics:
  # Lightmap filtering mode (default: bilinear)
  # bilinear = GPU hardware filtering (fast, matches original engine)
  # bicubic  = cubic B-spline shader (smoother, minimal GPU cost)
  lightmap_filtering: bilinear

  # Texture filtering mode (default: 0)
  # 0 = point (crispy, authentic)
  # 1 = bilinear
  # 2 = trilinear
  # 3 = anisotropic
  filter_mode: 0

  # Gamma-correct mipmap generation (default: false)
  # Linearizes sRGB textures before downsampling for correct blending
  linear_mips: false

  # Sharpen mip levels to preserve detail at distance (default: false)
  sharp_mips: false

water:
  # Vertex wave displacement amplitude in world units (default: 0.3)
  # 0 = perfectly flat water, higher = more dramatic waves
  wave_amplitude: 0.3

  # UV texture distortion strength (default: 0.015)
  # 0 = no ripple, higher = more wobbly texture
  uv_distortion: 0.015

  # UV rotation speed in radians/sec (default: 0.015)
  # 0 = no rotation, creates slow swirling water motion
  rotation_speed: 0.015

  # UV scroll speed in world units/sec (default: 0.05)
  # 0 = no drift, creates directional water flow
  scroll_speed: 0.05

physics:
  # Physics timestep rate (default: 60)
  # Controls the fixed timestep for player physics simulation.
  # Accepts string names or integer Hz values:
  #   "vintage" or 12 = 12.5Hz (original Dark Engine rate, 3 collision iterations)
  #   "modern" or 60  = 60Hz (default, smooth modern physics, 1 collision iteration)
  #   "ultra" or 120  = 120Hz (high fidelity, 1 collision iteration)
  # Higher rates give smoother collision but cost more CPU.
  # All rates produce equivalent physics behavior (same walk speed, jump height,
  # head bob timing).
  # Toggle at runtime via debug console (backtick key).
  # CLI: --physics-rate <12|60|120>
  rate: 60

developer:
  # Render object meshes (default: true)
  # Set to false for world-geometry-only view
  show_objects: true

  # Show colored fallback cubes for objects with missing models (default: false)
  # Enable for debugging which objects lack .bin models in obj.crf
  show_fallback_cubes: false

  # Portal/frustum culling (default: true)
  # Toggle at runtime with C key
  portal_culling: true

  # Force all animated lights to flicker mode (default: false)
  # Useful for debugging light animation
  force_flicker: false

  # Camera collision with world geometry (default: false)
  # Toggle at runtime with V key
  camera_collision: false

  # Log stair step diagnostics to stderr (default: false)
  # Prints [STEP] messages for debugging stair-step logic
  # CLI: --step-log
  step_log: false


audio:
  # Reflection convolution rate divisor (1, 2, or 4).
  # 1 = full rate (48kHz), 2 = half rate (24kHz), 4 = quarter rate (12kHz).
  # Higher divisors reduce per-voice cost. Reverb is perceptually transparent
  # at quarter rate (6kHz bandwidth captures all reverb character).
  reflection_rate_divisor: 2

  # Number of parallel convolution worker threads (0 = auto).
  # Auto selects hardware_concurrency - 3. More workers = more voices.
  convolution_workers: 0

  # Maximum voices with per-source reflection convolution (1-64).
  # With multiple workers, higher values are feasible.
  max_reflection_voices: 16

  # Ambisonics order for reflection reverb (0 or 1).
  # 0 = omnidirectional (cheap), 1 = directional (4x cost, more spatial)
  ambisonics_order: 0

  # Rays per reflection simulation step (background thread, 128-8192)
  reflection_rays: 4096

  # Bounces per ray (1-8). More bounces = sound reaches further around corners.
  reflection_bounces: 4

  # Max reverb tail in seconds (0.5-4.0)
  reflection_duration: 2.0

  # Run reflection simulation every Nth frame (1-32)
  reflection_throttle: 4

  # Volumetric occlusion source sphere radius in world units (0.1-10).
  # Larger = smoother transitions around corners (1.5 = lamp, 3.0 = machinery).
  occlusion_radius: 1.5

  # Volumetric occlusion ray samples per source (4-64).
  # More = smoother gradient but higher CPU cost per source.
  occlusion_samples: 16

  # Material transmission multiplier (0.1-100).
  # 1.0 = physically accurate, 10.0 = game-friendly (audible through walls)
  transmission_scale: 1.0

  # Material absorption multiplier (0.01-10).
  # 1.0 = physically accurate, 0.5 = more reflective surfaces, richer reverb.
  # Requires probe re-bake (delete .probes file).
  absorption_scale: 1.0

  # Diffuse scattering samples per bounce for real-time simulation (16-256)
  diffuse_samples: 64

  # Diffuse scattering samples per bounce for probe baking (32-512)
  # Requires probe re-bake.
  bake_diffuse_samples: 128

  # Propagation layer toggles (all on by default — debug use only)
  # portal_routing: true
  # probe_pathing: true
  # realtime_reflections: true

  # -- Master bus DSP chain --
  # Processing order: Low-shelf EQ → Compressor → Soft Limiter

  # Soft limiter — replaces hard digital clipping with smooth tanh saturation.
  # Transparent below the knee, smoothly curves to ±1.0 above.
  dsp_limiter: true
  dsp_limiter_knee: 0.8    # onset threshold (0.5–0.95, higher = later/subtler)

  # Master bus compressor — tames transients to preserve dynamic detail.
  # Keeps explosions and machinery from drowning out subtle ambients.
  dsp_compressor: true
  dsp_comp_threshold: -15   # dBFS threshold (-30 to 0)
  dsp_comp_ratio: 3.0       # compression ratio (1.5 to 10)

  # Low-shelf EQ — adds physical weight to the low end of the soundscape.
  # Enhances footsteps, distant machinery, and stone resonance.
  dsp_eq: true
  dsp_eq_freq: 120          # center frequency in Hz (60–500)
  dsp_eq_gain: 3.0          # shelf gain in dB (-6 to +6)

  # Ambient ducking — reduces ambient volumes when SFX voices play.
  # Keeps dialog, footsteps, and alerts prominent. Disabled by default.
  dsp_ducking: false
  dsp_duck_amount: 0.5      # ambient volume during ducking (0.1–1.0)
