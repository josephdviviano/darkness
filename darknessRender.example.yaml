# darknessRender configuration
# Copy this file to ./darknessRender.yaml in your working directory.
# CLI surface is intentionally minimal — every tunable lives here.
# CLI flags --res and --schemas override paths.* below for one-off runs.

# ── paths ──
# Optional. Set these once and you can launch with just a mission file.
# CLI --res / --schemas override these for one-off runs.
paths:
  res: ""        # Thief 2 RES directory (fam.crf, obj.crf, snd.crf). e.g.
                 #   /Volumes/THIEF2_INSTALL_C/THIEF2/RES
  schemas: ""    # Schema directory (.sch / .spc / .arc). e.g.
                 #   /Volumes/THIEF2_CD2/EDITOR/SCHEMA
                 # If empty, AudioService searches <res>/../EDITOR/SCHEMA.

graphics:
  # Texture filter mode (default: point)
  # point        = crispy, authentic Dark Engine look
  # bilinear     = soft GPU bilinear
  # trilinear    = bilinear with mip blending
  # anisotropic  = 16x AF for grazing-angle surfaces
  texture_filter: point

  # Lightmap filter mode (default: bilinear)
  # bilinear = GPU hardware filtering (fast, matches original engine)
  # bicubic  = cubic B-spline shader (smoother, minimal GPU cost)
  lightmap_filter: bilinear

  # Gamma-correct mipmap generation (default: false)
  # Linearizes sRGB textures before downsampling for correct blending
  linear_mips: false

  # Sharpen mip levels to preserve detail at distance (default: false)
  sharp_mips: false

water:
  # Vertex wave displacement amplitude in world units (default: 0.3)
  # 0 = perfectly flat water, higher = more dramatic waves
  wave_amplitude: 0.3

  # UV texture distortion strength (default: 0.015)
  # 0 = no ripple, higher = more wobbly texture
  uv_distortion: 0.015

  # UV rotation speed in radians/sec (default: 0.015)
  # 0 = no rotation, creates slow swirling water motion
  rotation_speed: 0.015

  # UV scroll speed in world units/sec (default: 0.05)
  # 0 = no drift, creates directional water flow
  scroll_speed: 0.05

physics:
  # Physics timestep rate (default: 60)
  # Controls the fixed timestep for player physics simulation.
  # Accepts string names or integer Hz values:
  #   "vintage" or 12 = 12.5Hz (original Dark Engine rate, 3 collision iterations)
  #   "modern" or 60  = 60Hz (default, smooth modern physics, 1 collision iteration)
  #   "ultra" or 120  = 120Hz (high fidelity, 1 collision iteration)
  # Higher rates give smoother collision but cost more CPU.
  # All rates produce equivalent physics behavior (same walk speed, jump height,
  # head bob timing).
  # Toggle at runtime via debug console (backtick key).
  # CLI: --physics-rate <12|60|120>
  rate: 60

developer:
  # Render object meshes (default: true)
  # Set to false for world-geometry-only view
  show_objects: true

  # Show colored fallback cubes for objects with missing models (default: false)
  # Enable for debugging which objects lack .bin models in obj.crf
  show_fallback_cubes: false

  # Portal/frustum culling (default: true)
  # Toggle at runtime in the debug console (`portal_culling`)
  portal_culling: true

  # Camera collision with world geometry (default: false)
  # Toggle at runtime in the debug console (`camera_collision`)
  camera_collision: false

  # Log stair step diagnostics to stderr (default: false)
  # Prints [STEP] messages for debugging stair-step logic
  step_log: false

  # Dump per-object filtering diagnostics to stderr (default: false)
  debug_objects: false

  # Auto-activate all moving terrain at startup (default: false)
  toggle_platforms: false

  # Skip Steam Audio probe baking (default: false)
  # Faster startup but no spatial audio reflections
  no_probes: false

  # Enable audio/sound/schema log output (default: false)
  audio_log: false

  # Record the engine's final stereo output (f32 WAV, post master DSP) to
  # output.wav next to the per-run audio_perf.jsonl (default: false).
  # CLI mirror: --capture-wav. Analyze offline with tools/wav_artifacts.py.
  capture_wav: false


audio:
  # Audio is organized into eight subsections. Skip any subsection to use
  # defaults; each setting is independent. Bracketed numbers are valid ranges.

  performance:
    # Engine + reverb throughput. Touch these to trade CPU for fidelity.
    #
    # Scope tags annotate which pipeline branch each setting affects:
    #   [GLOBAL]      audio engine / hardware
    #   [DIRECT]      direct path only (no reflections)
    #   [REALTIME]    realtime ray-traced reflections only
    #   [BAKE]        offline probe bake only
    #   [REFLECTIONS] both realtime + baked-probe reflection convolution

    # ── audio device (immutable after boot) ──
    sample_rate: 48000           # [GLOBAL] device sample rate (22050|32000|44100|48000|96000)
    frame_size: 512              # [GLOBAL] audio engine block size (256–4096); callback period = frame_size / sample_rate. 512 chosen for low total output latency (~32 ms with periods=2); halves the async convolution pipeline gap vs 1024.
    sound_cache_mb: 64           # [GLOBAL] decoded-audio LRU cache budget (4–1024 MB)

    # ── voice budgets ──
    max_active_voices: 64        # [GLOBAL] hard cap on simultaneous voices (8–256)
    # [REFLECTIONS] Cap on total reverb voices (realtime + baked combined).
    # Every reverb voice runs a per-source convolution regardless of mode,
    # so this is the worker-pool CPU governor. 0 disables reverb entirely
    # (fully dry). Direct-sim source pool is auto-derived from
    # max_active_voices; reflection-sim source pool from this cap.
    reverb_voices: 8             # (0–64)
    # [REALTIME] Of the reverb voices above, how many may run with realtime
    # ray-traced IRs. 0 = baked-only (recommended for now — see
    # NOTES.AUDIO_CONFIG_AUDIT.md Finding 1 about realtime sim cost).
    # Range [0, reverb_voices].
    reverb_voices_realtime: 0

    # ── reverb pipeline cost ──
    # rate_divisor halves CPU per step at the cost of reverb bandwidth.
    # 24 kHz is transparent for most material; 12 kHz dulls the highest
    # harmonics. Reverb tails are dominated by frequencies below 4 kHz.
    rate_divisor: 2              # [REFLECTIONS] 1=48k, 2=24k, 4=12k
    # reflection_throttle = run the realtime ray-trace sim every Nth audio
    # callback. Higher = less CPU, longer reverb-update latency.
    reflection_throttle: 4       # [REALTIME] (1–32)
    # Steam Audio per-source occlusion sample cap. Used by BOTH the direct
    # and reflection simulators' occlusion solvers.
    sim_max_occlusion_samples: 32  # [DIRECT+REFLECTIONS] (4–256)

    # ── thread budget ──
    # Two explicit integer counts for reverb work.
    #   conv_threads — per-voice convolution workers (USER_INTERACTIVE QoS)
    #   sim_threads  — Steam Audio ray-trace simulator threads (UTILITY QoS)
    # Both 0  = auto: total = max(4, hwconc - 2), split ~35% conv /
    #           ~65% sim in baked-only mode (~45% / ~55% with realtime
    #           voices). The sim is the bottleneck in both modes
    #           (hundreds of ms per cycle); convolution has plenty of
    #           headroom for typical voice counts.
    # Both > 0 = use the literal values (no invariant against hwconc).
    # Mixed (one 0, one > 0) emits a [REVERB_THREADS][FALLBACK] warning
    # and falls back to auto for both — the contract is "set both or
    # neither."
    conv_threads: 0
    sim_threads:  0

    # ── scene backend ──
    # "default" = Steam Audio's built-in CPU raytracer.
    # "embree"  = Embree (faster on large meshes) — requires a Steam Audio
    #             rebuild with Embree linked; falls back to "default" with
    #             a loud [FALLBACK] log if iplSceneCreate refuses.
    scene_type: default          # [REFLECTIONS]

  reflections:
    # Convolution-reverb feel. Drives perceived room size & detail.
    #
    # Bake vs realtime parameters are split into two sub-blocks because the
    # offline bake can afford much higher quality settings than the per-frame
    # realtime simulation. The bake runs once per mission and is cached
    # to disk; realtime runs every `reflection_throttle` audio frames and
    # drives the CPU budget for live sources.
    enabled: true                # [REFLECTIONS] master toggle (R key in console)
    # [REALTIME] ambisonic order: 0=omnidirectional (1ch, cheapest),
    # 1=directional (4ch), 2=(9ch), 3=(16ch). Memory + decode cost scale
    # with (N+1)^2 channels. Bake-side order is `bake.ambisonics_order`
    # below and can be higher than realtime — the runtime decoder downmixes
    # baked higher-order IRs as needed.
    ambisonics_order: 0          # 0–3
    # [REFLECTIONS] effect algorithm — HYBRID-only. The pipeline always runs
    # Steam Audio's `IPL_REFLECTIONEFFECTTYPE_HYBRID`:
    #   • HEAD: full FFT convolution over the first `hybrid_transition_time`
    #     seconds of the IR — preserves discrete early reflections.
    #   • TAIL: parametric (energy-based) reverb beyond the head, driven by
    #     RT60 sourced from `reverbTimes[3]` baked into the probe data
    #     (corresponds to the game's EAX-style reverb presets). Parametric
    #     tails do not beat from per-frame IR crossfade stacking, which is
    #     the failure mode that prompted the migration from CONVOLUTION.
    # The deprecated `type:` key is still parsed but ignored with a
    # [FALLBACK] warning if present in the YAML.

    # [REFLECTIONS] Hybrid head length. Steam Audio's Unity/Unreal reference
    # integrations default to 1.0 s. Applies to BOTH realtime AND baked
    # voices. Steam Audio crashes if hybrid_transition_time > IR duration
    # (realtime.duration / bake.duration), so we enforce a 0.1 s margin.
    hybrid_transition_time: 1.0  # seconds; pure conv 0..(T*(1-O))s, blend T*(1-O)..T s
    hybrid_overlap_percent: 0.25 # fraction of transition_time used for crossfade

    # Realtime simulation params (running every reflection_throttle frames).
    # Phase 4 lowered rays from 4096 and bounces from 8 toward Steam Audio's
    # recommended realtime defaults — the late-tail beauty now lives in the
    # parametric portion, so realtime doesn't need to over-sample.
    realtime:
      rays: 2048                 # rays per realtime sim step (128–8192)
      bounces: 4                 # bounces per ray (1–8); biggest CPU lever (each +1 doubles ray-segment work)
      duration: 1.1              # IR duration in seconds (must exceed hybrid_transition_time by 0.1 s margin)
      diffuse_samples: 32        # diffuse scattering samples per bounce (16–256)

    # Offline bake params (run once per mission; cached as .probes files).
    # Phase 5 raised these toward Unity's offline reference values so
    # adjacent probes have significantly less Monte Carlo noise variance.
    # Per-probe bake cost is roughly 32x higher than the old settings;
    # the Phase-8 adaptive probe spacing is what makes the total bake
    # time stay reasonable for shipping levels.
    bake:
      rays: 16384                # rays per bake step (1024–65536)
      bounces: 16                # bake bounces (1–64)
      duration: 1.1              # bake IR duration in seconds (>= realtime.duration; only the first hybrid_transition_time s is convolved, the rest feeds parametric RT60 estimation)
      diffuse_samples: 1024      # bake diffuse samples (32–4096)
      ambisonics_order: 2        # bake ambisonic order (0–3); may be higher than runtime ambisonics_order — Steam Audio's IPLReflectionEffectParams.numChannels lets the runtime process only the first N channels (per phonon.h: "May be less than the number of channels specified when creating the effect"), so a higher-order bake is read at the runtime cap with no extra work. The unused higher-order channels are dropped at apply time.

  probes:
    # Baked-probe grid parameters. Probes are points where Steam Audio
    # samples reflection IRs at bake time; the runtime interpolates between
    # the nearest 8 to produce a listener-position-dependent reverb.
    #
    # A halved spacing quadruples probe count and roughly quadruples bake
    # time, but reduces the audible amplitude swings as the listener walks
    # between probes (footsteps in particular). If footstep reverb feels
    # patchy with spacing=5, try 2.5 and re-bake (`bake_probes` in console).
    spacing: 5.0                 # grid spacing in feet (1.0–20.0; re-bake required)
    height: 5.0                  # probe height above floor in feet (0.5–20.0)
    # Extra elevations (feet, above each floor probe) to replicate the
    # floor grid at. Improves Steam Audio pathing for wall-mounted
    # torches and ceiling-mounted lamps, which would otherwise snap to
    # the floor probe directly underneath them. Default [10.0] covers
    # the common case. Set to [] to disable (floor-only). Re-bake
    # required.
    elevations: [10.0]
    # Minimum clearance, in engine feet, between a baked probe and the
    # nearest wall of its containing room. Drops two pathological cases
    # before baking:
    #   - inside-solid candidates (no containing room) → near-zero IR
    #   - wall-adjacent candidates → strong first-bounce reflection
    #     that comb-filters audio at multiples of c/(2·distance)
    # 0 disables the clearance check (inside-solid rejection still runs).
    # Default 5 ≈ 1.5 m, just outside the comb-filter danger zone
    # (~0.5–1 m). Setting above ~half a corridor's width rejects every
    # probe in that corridor — drop to 3 if you see coverage gaps. Re-bake
    # required.
    min_wall_clearance_ft: 5.0   # (0–50; 0 = clearance check off)
    # Elevation-tier sparsity. Floor probes are binned on a coarser
    # (x, y) grid (binSize = spacing × this) and ONE elevation probe is
    # placed at each bin's centroid per tier. 2.0 = 2×2 binning = 1:4
    # ratio of elevation to floor probes; 1.0 = legacy 1:1. With
    # emitter-anchored probes covering wall/ceiling emitters at their
    # actual positions, the elevation tier only needs enough density
    # for vertical sound propagation between levels.
    elevation_sparsity_mul: 2.0  # (1.0–8.0; higher = sparser; re-bake required)
    # Global dedup pass radius (engine feet). After all probe placement
    # (floor + elevation + portal + emitter), probes within this distance
    # of an earlier-kept probe get dropped. Catches cross-pass overlaps.
    # 0 = dedup disabled.
    global_dedup_radius_ft: 2.0  # (0.0–10.0; re-bake required)

  pathing_probes:
    # Steam Audio pathing uses a separate, sparse probe batch
    # (ROOM_PORTAL graph: one probe per room centroid + two probes
    # ±offset across each portal plane). Keeping pathing density low
    # makes `findAlternatePaths` microsecond-fast even when door OBBs
    # invalidate baked paths at runtime; the dense reflection probe
    # grid above is still used for IR sampling.
    #
    # Set to false to skip baking the pathing batch entirely. The
    # .probes file then contains only the reflection batch and Steam
    # Audio pathing falls back to the synthetic-bypass branch (no
    # diffraction routing). Requires a re-bake to take effect.
    enabled: true
    # Proximity dedup radius (engine feet) applied after pathing-
    # candidate emission. Drops any candidate within this distance
    # of an earlier-emitted one — catches compound-doorway portal
    # clusters, sub-room centroid overlap, and emitter-near-centroid
    # coincidences. 10 ft is a good default for Thief 2 levels (room
    # sizes 15-30 ft, compound doorways routinely cluster within 5
    # ft). Independent of the reflection batch's
    # global_dedup_radius_ft above. 0 disables the pass. Re-bake
    # required.
    dedup_radius_ft: 10.0  # (0.0–30.0)

  occlusion:
    # Source occlusion + global material multipliers.
    #
    # `radius` is in engine feet, converted to meters at the Steam Audio
    # boundary. Volumetric occlusion samples N points from a sphere of
    # this radius centered on the SOURCE and casts rays from each to the
    # listener; fraction unoccluded = unoccluded fraction. Tuning notes:
    #   • Too small → many sample points fall INSIDE the source's own
    #     visible mesh (e.g. a street-lamp embedded in its lamp-post
    #     model). Rays from those interior points hit the mesh on their
    #     way out → near-total self-occlusion. Listener hears nothing
    #     until they move/jump above the fixture.
    #   • Too big → rays from the far side can travel through walls
    #     before hitting the listener → falsely-unoccluded for sources
    #     that really are walled off.
    #
    # Rough sizing guide:
    #   5  ≈ candle / point source
    #   10 ≈ lamp / small fixture
    #   16 ≈ doorway / small machinery
    #   20 ≈ machinery / chest-sized solid source
    #   25+≈ ambient drone / industrial vent
    radius: 10.0                 # volumetric source sphere (feet, 0.3–30)
    samples: 16                  # rays per source for occlusion gradient (4–64)
    transmission_scale: 1.0      # material transmission multiplier (0.1–100; 10=game-friendly)
    absorption_scale: 0.75        # material absorption multiplier (0.01–10; <1 = more reflective)

  propagation:
    # BSP-cell-graph + door blocking for AI hearing and through-wall sounds.
    # Phase 1 of PLAN.CELL_GRAPH_PROPAGATION migrated player audio and AI
    # hearing to a single shared propagation algorithm; the per-mission
    # cell graph is built once at level load (~5ms on MISS6) and consulted
    # via a lazy per-source Dijkstra tree cache at runtime.
    portal_routing: true         # route sound through portal graph (doorways)
    probe_pathing: true          # baked probe diffraction (when probes loaded)
    max_distance: 200.0          # max propagation distance (world units, 10–5000)
    door_lpf_open_hz: 20000      # LPF cutoff for fully open door (Hz, 1k–24k)
    door_lpf_blocked_hz: 800     # LPF cutoff for fully blocked door (Hz, 100–10k)
    min_attenuation: 0.0         # propagation floor (0–0.1; floor disabled by default; was 0.001; FP-noise reasoning was speculative — left in place as a config knob in case it needs to be re-enabled)
    # N-path BFS: keep multiple portal-graph routes when a sound can reach
    # the listener through more than one doorway. 1 = single shortest path
    # (single-source behavior); 2 = original Dark Engine (dual-predecessor
    # scheme matching cBFRoomInfo + MergeSounds); 3-4 = modernized. The
    # multi-path-ambisonics renderer allocates up to 4 sub-source slots
    # per voice (kMaxSubSources in VoicePool.h), so set this to 4 to
    # keep every reachable doorway continuously active and avoid audible
    # loudness jumps when the kept-paths set swaps across listener
    # motion. Lower values pin the slot count and produce the legacy
    # set-swap behavior on cue.
    max_paths: 2                 # simultaneous propagation paths per listener (1–4)
    # An alternate path is kept only if its effective distance is within
    # this many world units of the primary. Filter runs MID-BFS (at
    # intermediate rooms, not only at the listener room), so a tight
    # window kills alternates early and they never reach the listener.
    # The legacy default (10) came from the original engine's
    # kMaxDistDiff and was tuned for a single-source renderer where
    # alternates only modulated a centroid. For the multi-path renderer
    # use 50 (the clamp ceiling) so essentially every distinct-
    # predecessor alternate within the propagation horizon stays
    # active — the per-slot renderer needs the unblocked-doorway path
    # available even when its effDist is notably longer than the
    # primary's wall-edge anchor path.
    max_path_diff: 50.0          # alternate-path distance window (world units, 0–50)
    # Multiplier on the scalar gain produced by Steam Audio's baked pathing
    # eqCoeffs. 1.0 = identity (use baked values as-is). Bump above 1 when
    # cross-room/through-doorway sound feels too dead and a re-bake (with
    # lower visibility threshold / denser probes) is too expensive. Does
    # NOT affect the LPF blocking factor — only amplitude.
    pathing_gain_scale: 1.0      # multiplier on pathing gain (0.1–10.0)
    # Steam Audio pathing-simulation throttle. iplSimulatorRunPathing runs
    # synchronously on the main loop thread; running it every frame can
    # stall the audio callback and produce reverb-path dropouts on busy
    # scenes. 0.1 s (10 Hz) matches the Unity/Unreal Steam Audio
    # integration defaults — the listener moves <1 ft per update at
    # walking speed, well below the threshold for hearing
    # portalAttenuation/portalBlocking changes. Output reads (eqCoeffs →
    # portal gain/LPF) still happen every frame and use Steam Audio's
    # last-cached values, so audio stays smooth between sim runs. Set
    # to 0.0 to update every frame (legacy / A-B diagnostic).
    pathing_update_interval: 0.1 # min seconds between pathing-sim updates (0.0–1.0)
    # Per-band weights for collapsing Steam Audio's 3-band eqCoeffs into
    # the scalar portalAttenuation gain. Applied as
    #   gain = wL·eqLow + wM·eqMid + wH·eqHigh
    # then scaled by pathing_gain_scale. Default {0.25, 0.50, 0.25} is
    # mid-heavy (roughly A-weighted). Weights NOT auto-normalised —
    # sums other than 1.0 produce a flat boost/cut. Each component
    # clamped to [0, 1]. Typical tunings:
    #   [0.25, 0.50, 0.25] default mid-heavy
    #   [0.50, 0.40, 0.10] bass-heavy — fuller cross-room sounds
    #   [0.33, 0.34, 0.33] flat — highs contribute equally
    #   [0.10, 0.40, 0.50] treble-heavy — muffled = quiet
    pathing_gain_band_weights: [0.25, 0.50, 0.25]

  spatialization:
    # Listener-side HRTF + distance attenuation curve.
    hrtf_volume: 1.0             # HRTF output gain (0–4)
    hrtf_interpolation: bilinear # "nearest" or "bilinear" (HRTF dataset interpolation)
    spatial_blend: 1.0           # 0=mono center, 1=full HRTF spatialization

  ambient:
    # P$AmbientHack-driven looping sounds (mission ambients).
    #
    # Voice lifecycle (Group D, 2026-05):
    #   * Spawn: dist < amb.radius (original-engine spawn boundary, no
    #     multiplier).
    #   * Halt:  perceived audibility (mapping.gain ×
    #            directParams.distanceAttenuation × schema_gain_linear)
    #            drops below `halt_audibility_threshold_db` for
    #            `halt_below_threshold_frames` consecutive ticks.
    # `spawn_fade_in_ms` / `halt_fade_out_ms` straight-line ramps hide
    # the discrete state-change pops on either end.
    spawn_fade_in_ms: 150        # volume ramp 0→full on voice spawn (0–2000 ms)
    halt_fade_out_ms: 250        # volume ramp full→0 before halt-stop (0–2000 ms)
    halt_audibility_threshold_db: -50  # dB level below which voice is "inaudible" (-80 to -20)
    halt_below_threshold_frames: 30    # consecutive sub-threshold frames before halt (5–600)
    default_priority: 64         # priority for ambients without explicit value (0–255)
    # Per-voice HRTF spatial-blend override for room-attached ambients
    # (AMB_ENVIRONMENTAL: wind, church reverberance, generic room tone).
    # 1.0 = full HRTF point-source pan (default for everything else);
    # 0.0 = mono passthrough with no directional cue. Lower values make
    # room ambients feel diffuse rather than coming from a single point.
    # Object-attached ambients (no AMB_ENVIRONMENTAL flag) ignore this
    # and keep full HRTF so e.g. a generator hum stays directional.
    environmental_spatial_blend: 0.3  # (0.0–1.0)
    # Global linear multiplier applied to every ambient + spot-ambient
    # voice. Compensates for the ambient-volume re-baseline introduced
    # when Steam Audio became the sole player-audio propagation authority
    # (the per-radius centibel falloff curve is retired). Single tuning
    # knob, default 1.0 = no change. Adjust by ear.
    global_volume_scale: 1.0     # (0.0–4.0)

  mixer:
    # Global gains. Independent direct/indirect knobs let you tune the
    # "around the corner" cue: lower direct_gain or raise reflection_gain
    # to make bounced sounds more prominent vs. line-of-sight sounds.
    #
    # direct_gain + reflection_gain default to 0.5 (paired -6 dB) because
    # [GAIN] logs showed Steam Audio's ambisonics decode pushing the wet
    # bus to +10 dBFS peak — lowering both gains by -6 dB in lockstep
    # gives the master chain ~6 dB of headroom for the EQ shelf and
    # compressor makeup while preserving the wet/dry ratio of the mix
    # (so the soundscape stays equally "spatial" but quieter overall).
    # Use master_gain or compressor settings to claw perceived loudness
    # back if needed.
    master_gain: 1.0             # global output multiplier (0–4)
    direct_gain: 0.5             # dry-bus multiplier — direct path only (0–4)
    reflection_gain: 0.5         # reverb wet bus multiplier — indirect path (0–4)
    reflection_ramp_ms: 10.0     # fade-in time on first reflection activation (1–1000 ms)

  dsp:
    # Master bus DSP chain. Processing order: Low-shelf EQ → Compressor → Limiter
    limiter_enabled: true              # soft tanh limiter (prevents digital clipping)
    limiter_knee: 0.8                  # onset threshold (0.5–0.95)

    compressor_enabled: true           # tames transients
    # Threshold raised from -15 to -12 dB and ratio bumped from 3:1 to 5:1
    # to keep the "oppressive" character on loud transients while engaging
    # less often on the median signal (the 3:1 @ -15 dB setting averaged
    # 6.6% of samples limited in heavy windows — audible gain pumping
    # rather than transient catching).
    compressor_threshold_db: -12.0     # dBFS threshold (-30 to 0)
    compressor_ratio: 5.0              # compression ratio (1.5–10)
    compressor_attack_ms: 10.0         # attack time (1–100 ms)
    compressor_release_ms: 250.0       # release time (50–2000 ms)

    eq_enabled: true                   # low-shelf EQ (adds bass weight)
    eq_freq_hz: 120.0                  # center frequency (60–500 Hz)
    eq_gain_db: 3.0                    # shelf gain (-6 to +6 dB)
    eq_q: 0.707                        # filter Q (0.3–2.0; 0.707 = Butterworth)

    ducking_enabled: false             # duck ambients when SFX plays
    ducking_amount: 0.5                # ambient volume during ducking (0.1–1.0)
    ducking_attack_ms: 50.0            # ducking attack (10–500 ms)
    ducking_release_ms: 500.0          # ducking release (50–5000 ms)

    # Wet-bus tape saturation — applies a soft tanh saturator to the SUMMED
    # reverb bus (post reflGain ramp, before mixing with dry path). Models
    # analog tape / phonograph compression — nearly transparent for quiet
    # reverb, harmonic warmth at moderate levels, brick-wall ceiling at loud
    # peaks. Doubles as a graceful clip-handler for pathological hot probes
    # (e.g. a player inside a small metal container with an interior ambient)
    # without polluting the dry signal.
    #
    # drive  feel                                       peak ceiling
    #   1.0  soft brick-wall only, no audible color     ±1.0
    #   2-3  audible tape-like warmth                   ±0.5..0.33
    #   4-6  vintage phonograph character               ±0.25..0.16
    #   8-10 heavy, almost lo-fi                        ±0.13..0.10
